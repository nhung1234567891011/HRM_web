<div class="grid">
    <!-- Báo cáo phân bổ nhân sự -->
    <div class="chart-col">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">Báo cáo phân bổ nhân sự</h4>
                <div class="flex align-items-center gap-2">
                    <p-dropdown [options]="hrChartTypeOptions" [(ngModel)]="hrChartType" optionLabel="label"
                        optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                        (onChange)="onChartTypeChange('hr', $event)"></p-dropdown>
                </div>
            </div>
            <div style="height: 380px;">
                <p-chart *ngIf="hrChartData" [type]="hrChartType" [data]="hrChartData" [options]="hrChartOptions" [plugins]="hrChartPlugins"
                    [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>

    <!-- Báo cáo thu nhập theo tháng -->
    <div class="chart-col">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">Báo cáo tổng hợp thu nhập</h4>
                <div class="flex align-items-center gap-2">
                    <span class="font-medium">Từ tháng</span>
                    <p-dropdown [options]="monthOptions" [(ngModel)]="fromMonth" optionLabel="label" optionValue="value"
                        placeholder="Từ tháng" appendTo="body" [style]="{ width: '120px' }"
                        (onChange)="onPeriodChange()"></p-dropdown>
                    <span class="font-medium">Đến tháng</span>
                    <p-dropdown [options]="monthOptions" [(ngModel)]="toMonth" optionLabel="label" optionValue="value"
                        placeholder="Đến tháng" appendTo="body" [style]="{ width: '120px' }"
                        (onChange)="onPeriodChange()"></p-dropdown>
                    
                    <p-dropdown [options]="incomeChartTypeOptions" [(ngModel)]="incomeChartType" optionLabel="label"
                        optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '140px' }"
                        (onChange)="onChartTypeChange('income', $event)"></p-dropdown>
                </div>
            </div>
            <div class="chart-body" [style.height.px]="incomeChartContainerHeight">
                <p-chart *ngIf="incomeChartData" [type]="incomeChartType" [data]="incomeChartData"
                    [options]="incomeChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>

    <!-- Báo cáo hiệu suất -->
    <div class="chart-col">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">Báo cáo hiệu suất (KPI doanh số theo hoa hồng)</h4>
                <div class="flex align-items-center gap-2">
                    <p-dropdown [options]="perfChartTypeOptions" [(ngModel)]="perfChartType" optionLabel="label"
                        optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                        (onChange)="onChartTypeChange('performance', $event)"></p-dropdown>
                </div>
            </div>
            <div style="height: 380px;">
                <p-chart *ngIf="perfChartData" [type]="perfChartType" [data]="perfChartData"
                    [options]="perfChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>

    <!-- Báo cáo chuyên cần -->
    <div class="chart-col">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">Báo cáo chuyên cần</h4>
                <div class="flex align-items-center gap-2">
                    <span class="font-medium">Từ tháng</span>
                    <p-dropdown [options]="monthOptions" [(ngModel)]="fromMonth" optionLabel="label" optionValue="value"
                        placeholder="Từ tháng" appendTo="body" [style]="{ width: '130px' }"
                        (onChange)="onPeriodChange()"></p-dropdown>
                    <span class="font-medium">Đến tháng</span>
                    <p-dropdown [options]="monthOptions" [(ngModel)]="toMonth" optionLabel="label" optionValue="value"
                        placeholder="Đến tháng" appendTo="body" [style]="{ width: '130px' }"
                        (onChange)="onPeriodChange()"></p-dropdown>
                    <p-dropdown [options]="attendanceChartTypeOptions" [(ngModel)]="attendanceChartType" optionLabel="label"
                        optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                        (onChange)="onChartTypeChange('attendance', $event)"></p-dropdown>
                </div>
            </div>
            <div class="chart-body" [style.height.px]="attendanceChartContainerHeight">
                <p-chart *ngIf="attendanceChartData" [type]="attendanceChartType" [data]="attendanceChartData"
                    [options]="attendanceChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>
</div>
