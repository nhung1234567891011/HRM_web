<div class="grid">
    <!-- Báo cáo phân bổ nhân sự -->
    <div class="chart-col chart-col-hr">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">Báo cáo phân bổ nhân sự</h4>
                <div class="flex align-items-center gap-2">
                    <p-dropdown [options]="hrChartTypeOptions" [(ngModel)]="hrChartType" optionLabel="label"
                        optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                        (onChange)="onChartTypeChange('hr', $event)"></p-dropdown>
                </div>
            </div>
            <div style="height: 380px;">
                <p-chart *ngIf="hrChartData" [type]="hrChartType" [data]="hrChartData" [options]="hrChartOptions" [plugins]="hrChartPlugins"
                    [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>

    <!-- Báo cáo thu nhập theo tháng -->
    <div class="chart-col chart-col-income">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">Báo cáo tổng hợp thu nhập</h4>
                <div class="flex align-items-center gap-2">
                    <p-calendar [(ngModel)]="incomeFromPeriod" view="month" dateFormat="mm/yy" placeholder="MM/YY"
                        appendTo="body" [showIcon]="true" [readonlyInput]="true" [style]="{ width: '140px' }"
                        (ngModelChange)="onIncomePeriodChange()"></p-calendar>
                    <p-calendar [(ngModel)]="incomeToPeriod" view="month" dateFormat="mm/yy" placeholder="MM/YY"
                        appendTo="body" [showIcon]="true" [readonlyInput]="true" [style]="{ width: '140px' }"
                        (ngModelChange)="onIncomePeriodChange()"></p-calendar>
                    
                    <p-dropdown [options]="incomeChartTypeOptions" [(ngModel)]="incomeChartType" optionLabel="label"
                        optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '140px' }"
                        (onChange)="onChartTypeChange('income', $event)"></p-dropdown>
                </div>
            </div>
            <div class="chart-body" [style.height.px]="incomeChartContainerHeight">
                <p-chart *ngIf="incomeChartData" [type]="incomeChartType" [data]="incomeChartData"
                    [options]="incomeChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>

    <!-- Báo cáo hiệu suất -->
    <div class="chart-col chart-col-performance">
        <div class="card">
            <div class="mb-4">
                <h4 class="m-0 mb-3">Báo cáo hiệu suất (KPI doanh số theo hoa hồng)</h4>
                <div class="flex align-items-center gap-2 flex-wrap">
                    <p-calendar [(ngModel)]="performanceFromPeriod" view="month" dateFormat="mm/yy" placeholder="Từ MM/YY"
                        appendTo="body" [showIcon]="true" [readonlyInput]="true" [style]="{ width: '140px' }"
                        (ngModelChange)="onPerformancePeriodChange()"></p-calendar>
                    <p-calendar [(ngModel)]="performanceToPeriod" view="month" dateFormat="mm/yy" placeholder="Đến MM/YY"
                        appendTo="body" [showIcon]="true" [readonlyInput]="true" [style]="{ width: '140px' }"
                        (ngModelChange)="onPerformancePeriodChange()"></p-calendar>
                    <p-dropdown [options]="perfChartTypeOptions" [(ngModel)]="perfChartType" optionLabel="label"
                        optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                        (onChange)="onChartTypeChange('performance', $event)"></p-dropdown>
                </div>
            </div>
            <div style="height: 380px;">
                <p-chart *ngIf="performanceHasData && perfChartData" [type]="perfChartType" [data]="perfChartData"
                    [options]="perfChartOptions" [plugins]="perfChartPlugins" [style]="{ width: '100%', height: '100%' }"></p-chart>
                <div *ngIf="!performanceHasData" class="chart-empty-state">Không có dữ liệu</div>
            </div>
        </div>
    </div>

    <!-- Báo cáo chuyên cần -->
    <div class="chart-col chart-col-attendance">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">Báo cáo chuyên cần</h4>
                <div class="flex align-items-center gap-2">
                    <p-calendar [(ngModel)]="attendanceFromPeriod" view="month" dateFormat="mm/yy" placeholder="MM/YY"
                        appendTo="body" [showIcon]="true" [readonlyInput]="true" [style]="{ width: '140px' }"
                        (ngModelChange)="onAttendancePeriodChange()"></p-calendar>
                    <p-calendar [(ngModel)]="attendanceToPeriod" view="month" dateFormat="mm/yy" placeholder="MM/YY"
                        appendTo="body" [showIcon]="true" [readonlyInput]="true" [style]="{ width: '140px' }"
                        (ngModelChange)="onAttendancePeriodChange()"></p-calendar>
                    <p-dropdown [options]="attendanceChartTypeOptions" [(ngModel)]="attendanceChartType" optionLabel="label"
                        optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                        (onChange)="onChartTypeChange('attendance', $event)"></p-dropdown>
                </div>
            </div>
            <div class="attendance-charts-row">
                <div class="attendance-chart-panel">
                    <h5 class="mini-chart-title">Biểu đồ chuyên cần</h5>
                    <div class="chart-body chart-body-compact" [style.height.px]="attendanceChartContainerHeight">
                        <p-chart *ngIf="attendanceChartData" [type]="attendanceChartType" [data]="attendanceChartData"
                            [options]="attendanceChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
                    </div>
                </div>

                <div class="attendance-chart-panel attendance-ot-wrapper">
                    <h5 class="mini-chart-title">Biểu đồ số giờ OT</h5>
                    <div class="chart-body chart-body-compact" [style.height.px]="overtimeChartContainerHeight">
                        <p-chart *ngIf="overtimeChartData" [type]="overtimeChartType" [data]="overtimeChartData"
                            [options]="overtimeChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
