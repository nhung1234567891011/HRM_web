<!-- <p-confirmPopup></p-confirmPopup> -->

<div class="grid">
    <div class="col-12">
        <p-toolbar styleClass="mb-2">
            <div class="">
                <strong class="font-size-16">Doanh thu hoa hồng</strong>
                <app-shared-breadcrumb [model]="$any(this).items || []"></app-shared-breadcrumb>
            </div>
        </p-toolbar>
        <div class="toast-container">
            <p-messages
                [(value)]="messages"
                [enableService]="false"
                [closable]="false"
            ></p-messages>
        </div>
        <div class="card">
            <div style="display: flex; justify-content: space-between;" class="gap-3">
                <div class="flex flex-column">
                    <p-autoComplete
                        [style]="{ height: '43px', width: '300px' }"
                        [(ngModel)]="selectedEmployee"
                        [suggestions]="filteredEmployees"
                        (completeMethod)="searchEmployee($event)"
                        [field]="'displayName'"
                        [forceSelection]="true"
                        [showClear]="true"
                        placeholder="Tìm kiếm nhân viên"
                        (onSelect)="fetchData()">
                    </p-autoComplete>
                </div>
                <div class="flex gap-3">
                    <div class="flex flex-column">
                        <!-- <p-button
                            pTooltip="Ẩn/hiện cột"
                            label=""
                            [outlined]="true"
                            severity="secondary"
                            icon="pi pi-table"
                            (onClick)="colPanelRef.toggle($event)"
                        ></p-button> -->

                        <p-overlayPanel #colPanelRef>
                            <div style="padding: 8px; min-width: 220px;">
                                <p style="font-weight: 600; margin-bottom: 8px;">Chọn cột hiển thị</p>
                                <div *ngFor="let col of allColumns" style="margin-bottom: 6px;">
                                    <p-checkbox
                                        [binary]="true"
                                        [label]="col.header"
                                        [ngModel]="isColVisible(col.field)"
                                        (onChange)="onColumnToggle($event, col)"
                                        [ngModelOptions]="{ standalone: true }"
                                    >
                                    </p-checkbox>
                                </div>
                            </div>
                        </p-overlayPanel>
                    </div>
                    <div class="flex flex-column">
                        <p-dropdown
                            [options]="staffPosition"
                            [(ngModel)]="selectedStaffPosition"
                            optionLabel="name"
                            [style]="{ width: '300px' }"
                            [showClear]="true"
                            placeholder="Chọn vị trí"
                            (onChange)="fetchData()"
                            (onClear)="fetchData()">
                      </p-dropdown>
                    </div>
                    <div class="flex flex-column">
                        <p-treeSelect
                            [options]="treeData"
                            [(ngModel)]="selectedNode"
                            [placeholder]="'Chọn đơn vị'"
                            [showClear]="true"
                            [style]="{ width: '300px' }"
                            (onNodeSelect)="onOrgChange()"
                            (onClear)="onOrgChange()"
                        ></p-treeSelect>
                    </div>
                </div>
            </div>

            <div class="table-section" style="margin-top: 20px">
                <p-table
                    [value]="detailKpi || []"
                    [rows]="pageSize"
                    [totalRecords]="totalRecords"
                    [paginator]="false"
                    responsiveLayout="scroll"
                    (onPage)="onPageChange($event)"
                    styleClass="p-datatable-striped"
                    >
                    <ng-template pTemplate="header">
                        <tr>
                            <!-- <th style="width: 5%;">
                                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
                            </th> -->
                            <th *ngIf="isColVisible('employeeCode')" style="width: 10%;">Mã nhân viên</th>
                            <th *ngIf="isColVisible('employeeName')" style="width: 20%;">Tên nhân viên</th>
                            <th *ngIf="isColVisible('revenue')" style="width: 20%;">Doanh thu</th>
                            <th *ngIf="isColVisible('commission')" style="width: 20%;">Hoa hồng</th>
                            <th *ngIf="isColVisible('bonus')" style="width: 20%;">Thưởng</th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-rowData let-i="rowIndex">
                        <tr>
                            <!-- <td>
                                <p-tableCheckbox [value]="rowData"></p-tableCheckbox>
                            </td> -->
                            <td *ngIf="isColVisible('employeeCode')">{{ rowData.employeeCode }}</td>
                            <td *ngIf="isColVisible('employeeName')">{{ rowData.employeeName }}</td>
                            <td *ngIf="isColVisible('revenue')">
                                <!-- Luôn hiển thị input để nhập doanh thu trực tiếp -->
                                <input
                                    type="number"
                                    [(ngModel)]="rowData.revenue"
                                    (blur)="onRevenueBlur(rowData)"
                                    (keydown.enter)="onRevenueBlur(rowData)"
                                    class="p-inputtext p-component"
                                    style="width: 90%; min-width: 100px;"
                                    min="0"
                                    placeholder="0"
                                />
                            </td>
                            <td *ngIf="isColVisible('commission')">
                                <!-- Tính hoa hồng theo cấu hình khi có doanh thu (áp dụng cho SALE/CTV) -->
                                <ng-container *ngIf="getCommissionValue(rowData) !== null; else commissionEmpty">
                                    <span>{{ getCommissionValue(rowData) | number:'1.0-0' }} ₫</span>
                                </ng-container>
                                <ng-template #commissionEmpty>
                                    <span style="color: #999;">-</span>
                                </ng-template>
                            </td>
                            <td *ngIf="isColVisible('bonus')">
                                <!-- Hiển thị input nếu hàng đang được chỉnh sửa -->
                                <div *ngIf="editingRowIndex2 === i; else displayValue2">
                                <input
                                    type="number"
                                    [(ngModel)]="rowData.bonus"
                                    (blur)="stopEditingAndSave2(rowData)"
                                    (keydown.enter)="stopEditingAndSave2(rowData)"
                                    class="p-inputtext p-component"
                                    style="width: 40%;"
                                />
                                </div>
                                <!-- Hiển thị giá trị nếu không trong chế độ chỉnh sửa -->
                                <ng-template #displayValue2>
                                    <span (click)="startEditing2(i)" style="cursor: pointer;">
                                        {{ rowData.bonus || 0 }} ₫
                                    </span>
                                </ng-template>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>


                <div *ngIf="totalRecords === 0" style="text-align: center; margin-top: 20px;">
                    <strong style="text-align: center; width: 100%">Không tìm thấy kết quả phù hợp</strong>
                </div>

                <div class="paging-bot dg-fix">
                    <div class="paging-info">
                        <div [innerHTML]="currentPageReport"></div>
                    </div>
                    <p-paginator [rows]="this.pageSize" (onPageChange)="onPageChange($event)"
                        [totalRecords]="totalRecords > 0 ? totalRecords : 1" [rowsPerPageOptions]="[10, 20, 30]"
                        [first]="
                    (this.pageIndex - 1) *
                    this.pageSize
                  "></p-paginator>
                </div>

            </div>
        </div>
    </div>
</div>
