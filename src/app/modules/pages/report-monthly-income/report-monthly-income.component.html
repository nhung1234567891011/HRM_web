<div class="grid">
    <div class="col-12">
        <p-breadcrumb [model]="items"></p-breadcrumb>
    </div>

    <div class="col-12">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-3">
                <h3 class="m-0">Báo cáo tổng hợp thu nhập (theo tháng)</h3>
                <div class="flex align-items-center gap-2">
                    <p-dropdown [options]="yearOptions" [(ngModel)]="selectedYear" optionLabel="label"
                        optionValue="value" placeholder="Chọn năm" [style]="{ width: '150px' }"
                        (onChange)="onYearChange()"></p-dropdown>
                    <p-treeSelect [options]="treeData" [(ngModel)]="selectedOrganization" placeholder="Chọn phòng ban"
                        [style]="{ width: '250px' }" (onNodeSelect)="onOrganizationChange($event)"
                        [showClear]="true"></p-treeSelect>
                </div>
            </div>
        </div>
    </div>

    <!-- Xu hướng thu nhập theo tháng -->
    <div class="col-12">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-3">
                <h4 class="m-0">Xu hướng thu nhập theo tháng</h4>
                <p-dropdown [options]="chartTypeOptions" [(ngModel)]="monthlyChartType" optionLabel="label"
                    optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                    (onChange)="onChartTypeChange('monthly', $event)"></p-dropdown>
            </div>
            <div style="height: 450px;">
                <p-chart *ngIf="monthlyChartData" [type]="monthlyChartType" [data]="monthlyChartData"
                    [options]="monthlyChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>

    <!-- So sánh theo phòng ban -->
    <div class="col-12">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-3">
                <h4 class="m-0">So sánh thu nhập theo phòng ban</h4>
                <p-dropdown [options]="chartTypeOptions" [(ngModel)]="deptChartType" optionLabel="label"
                    optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                    (onChange)="onChartTypeChange('dept', $event)"></p-dropdown>
            </div>
            <div style="height: 450px;">
                <p-chart *ngIf="deptChartData" [type]="deptChartType" [data]="deptChartData"
                    [options]="deptChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>
</div>
