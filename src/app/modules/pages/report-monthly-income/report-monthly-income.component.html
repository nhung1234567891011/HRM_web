<div class="grid">
    <div class="col-12">
        <app-shared-breadcrumb [model]="$any(this).items || []"></app-shared-breadcrumb>
    </div>

    <div class="col-12">
        <div class="card filter-card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h3 class="m-0">Báo cáo tổng hợp thu nhập (theo tháng)</h3>
                <div class="flex align-items-center gap-3">
                    <p-dropdown [options]="yearOptions" [(ngModel)]="selectedYear" optionLabel="label"
                        appendTo="body"
                        optionValue="value" placeholder="Chọn năm" [style]="{ width: '150px' }"
                        (onChange)="onYearChange()"></p-dropdown>
                    <p-treeSelect [options]="treeData" [(ngModel)]="selectedOrganization" placeholder="Chọn phòng ban"
                        appendTo="body"
                        [style]="{ width: '250px' }" (onNodeSelect)="onOrganizationChange($event)"
                        (onClear)="onOrganizationClear()" [showClear]="true"></p-treeSelect>
                </div>
            </div>
        </div>
    </div>

    <!-- Xu hướng thu nhập theo tháng -->
    <div class="col-12">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">Xu hướng thu nhập theo tháng</h4>
                <p-dropdown [options]="monthlyChartTypeOptions" [(ngModel)]="monthlyChartType" optionLabel="label"
                    appendTo="body"
                    optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                    (onChange)="onChartTypeChange('monthly', $event)"></p-dropdown>
            </div>
            <div style="height: 470px;">
                <p-chart *ngIf="chartVisible.monthly && canRenderChart('monthly')" [type]="monthlyChartType" [data]="monthlyChartData"
                    [options]="monthlyChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>

    <!-- So sánh theo vị trí -->
    <div class="col-12">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">So sánh thu nhập theo vị trí</h4>
                <p-dropdown [options]="deptChartTypeOptions" [(ngModel)]="deptChartType" optionLabel="label"
                    appendTo="body"
                    optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                    (onChange)="onChartTypeChange('dept', $event)"></p-dropdown>
            </div>
            <div style="height: 470px;">
                <p-chart *ngIf="chartVisible.dept && canRenderChart('dept')" [type]="deptChartType" [data]="deptChartData"
                    [options]="deptChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>
</div>
