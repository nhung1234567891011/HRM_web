<div class="grid">
    <div class="col-12">
        <app-shared-breadcrumb [model]="$any(this).items || []"></app-shared-breadcrumb>
    </div>

    <div class="col-12">
        <div class="card filter-card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h3 class="m-0">Báo cáo hiệu suất bán hàng</h3>
                <div class="flex align-items-center gap-3">
                    <p-dropdown [options]="yearOptions" [(ngModel)]="selectedYear" optionLabel="label" appendTo="body"
                        optionValue="value" placeholder="Chọn năm" [style]="{ width: '140px' }"
                        (onChange)="onFilterChange()"></p-dropdown>
                    <p-dropdown [options]="monthOptions" [(ngModel)]="selectedMonth" optionLabel="label"
                        appendTo="body"
                        optionValue="value" placeholder="Chọn tháng" [style]="{ width: '140px' }"
                        (onChange)="onFilterChange()"></p-dropdown>
                    <p-treeSelect [options]="treeData" [(ngModel)]="selectedOrganization" placeholder="Chọn phòng ban"
                        appendTo="body"
                        [style]="{ width: '250px' }" (onNodeSelect)="onOrganizationChange($event)"
                        (onClear)="onOrganizationClear()" [showClear]="true"></p-treeSelect>
                </div>
            </div>
        </div>
    </div>

    <!-- Top 7 nhân viên hoa hồng -->
    <div class="col-12 lg:col-6">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">Top 7 nhân viên hoa hồng</h4>
                <p-dropdown [options]="chartTypeOptions" [(ngModel)]="histogramChartType" optionLabel="label"
                    appendTo="body"
                    optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                    (onChange)="onChartTypeChange('histogram', $event)"></p-dropdown>
            </div>
            <div style="height: 420px;">
                <p-chart *ngIf="chartVisible.histogram && canRenderChart('histogram')" [type]="histogramChartType" [data]="histogramChartData"
                    [options]="histogramChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>
</div>
