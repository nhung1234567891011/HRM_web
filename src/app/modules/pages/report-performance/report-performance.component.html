<div class="grid">
    <div class="col-12">
        <p-breadcrumb [model]="items"></p-breadcrumb>
    </div>

    <div class="col-12">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-3">
                <h3 class="m-0">Báo cáo hiệu suất</h3>
                <div class="flex align-items-center gap-2">
                    <p-dropdown [options]="yearOptions" [(ngModel)]="selectedYear" optionLabel="label"
                        optionValue="value" placeholder="Chọn năm" [style]="{ width: '140px' }"
                        (onChange)="onFilterChange()"></p-dropdown>
                    <p-dropdown [options]="monthOptions" [(ngModel)]="selectedMonth" optionLabel="label"
                        optionValue="value" placeholder="Chọn tháng" [style]="{ width: '140px' }"
                        (onChange)="onFilterChange()"></p-dropdown>
                    <p-treeSelect [options]="treeData" [(ngModel)]="selectedOrganization" placeholder="Chọn phòng ban"
                        [style]="{ width: '250px' }" (onNodeSelect)="onOrganizationChange($event)"
                        [showClear]="true"></p-treeSelect>
                </div>
            </div>
        </div>
    </div>

    <!-- KPI theo phòng ban -->
    <div class="col-12 md:col-6">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-3">
                <h4 class="m-0">KPI theo phòng ban</h4>
                <p-dropdown [options]="chartTypeOptions" [(ngModel)]="deptKpiChartType" optionLabel="label"
                    optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                    (onChange)="onChartTypeChange('deptKpi', $event)"></p-dropdown>
            </div>
            <div style="height: 400px;">
                <p-chart *ngIf="deptKpiChartData" [type]="deptKpiChartType" [data]="deptKpiChartData"
                    [options]="deptKpiChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>

    <!-- Phân phối KPI (Histogram) -->
    <div class="col-12 md:col-6">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-3">
                <h4 class="m-0">Phân phối KPI nhân viên</h4>
                <p-dropdown [options]="chartTypeOptions" [(ngModel)]="histogramChartType" optionLabel="label"
                    optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                    (onChange)="onChartTypeChange('histogram', $event)"></p-dropdown>
            </div>
            <div style="height: 400px;">
                <p-chart *ngIf="histogramChartData" [type]="histogramChartType" [data]="histogramChartData"
                    [options]="histogramChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>

    <!-- Top nhân viên KPI -->
    <div class="col-12 md:col-6">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-3">
                <h4 class="m-0">Top nhân viên theo KPI</h4>
                <p-dropdown [options]="chartTypeOptions" [(ngModel)]="empKpiChartType" optionLabel="label"
                    optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                    (onChange)="onChartTypeChange('empKpi', $event)"></p-dropdown>
            </div>
            <div style="height: 400px;">
                <p-chart *ngIf="empKpiChartData" [type]="empKpiChartType" [data]="empKpiChartData"
                    [options]="empKpiChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>

    <!-- Hiệu suất làm việc -->
    <div class="col-12">
        <div class="card">
            <div class="flex justify-content-between align-items-center mb-3">
                <h4 class="m-0">Hiệu suất làm việc</h4>
                <p-dropdown [options]="chartTypeOptions" [(ngModel)]="efficiencyChartType" optionLabel="label"
                    optionValue="value" placeholder="Loại biểu đồ" [style]="{ width: '180px' }"
                    (onChange)="onChartTypeChange('efficiency', $event)"></p-dropdown>
            </div>
            <div style="height: 450px;">
                <p-chart *ngIf="efficiencyChartData" [type]="efficiencyChartType" [data]="efficiencyChartData"
                    [options]="efficiencyChartOptions" [style]="{ width: '100%', height: '100%' }"></p-chart>
            </div>
        </div>
    </div>
</div>
