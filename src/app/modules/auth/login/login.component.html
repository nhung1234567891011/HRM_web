<div class="login-wrapper">
    <div class="login-bg">
        <img src="assets/image/banner.jpg" alt="background">
    </div>

    <div class="login-card">
        <div class="login-header">
            <div class="logo-row">
                <img src="assets/image/logo.png" alt="EUCHOICE" class="logo-img">
                <span class="logo-text">EUCHOICE</span>
            </div>
            <h2 class="company-name">CÔNG TY TNHH</h2>
            <h2 class="company-name">XUẤT NHẬP KHẨU HỮU CƠ VIỆT NAM</h2>
        </div>

        <form class="login-form" [formGroup]="loginForm" (submit)="handleOnSubmitLogin()">
            <div class="input-group-custom">
                <i class="pi pi-user input-icon"></i>
                <input formControlName="email" type="text" placeholder="Tên đăng nhập">
                <app-validation-message [form]="loginForm" [messages]="validationMessages"
                    field="email"></app-validation-message>
            </div>

            <div class="input-group-custom">
                <i class="pi pi-lock input-icon"></i>
                <input formControlName="password" [type]="showPassword ? 'text' : 'password'" placeholder="Mật khẩu">
                <button
                    type="button"
                    class="toggle-password-btn"
                    (click)="togglePasswordVisibility()"
                    [attr.aria-label]="showPassword ? 'Ẩn mật khẩu' : 'Hiển thị mật khẩu'">
                    <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
                </button>
                <app-validation-message [form]="loginForm" [messages]="validationMessages"
                    field="password"></app-validation-message>
            </div>

            <div class="remember-me">
                <label class="checkbox-label">
                    <input formControlName="rememberMe" type="checkbox">
                    <span>Ghi nhớ đăng nhập</span>
                </label>
            </div>

            <p-button class="btn-login-wrapper" styleClass="btn-login" type="submit" label="Đăng nhập"
                [loading]="isSubmitting" [disabled]="isSubmitting">
            </p-button>

            <div class="forgot-password">
                <a routerLink="/auth/recover-password">Quên mật khẩu?</a>
            </div>
        </form>

        <div class="login-footer">
            EUCHOICE &copy; 2026
        </div>
    </div>
</div>
<p-toast />
