<div class="auth-wrapper">
    <div class="auth-bg">
        <img src="assets/image/banner.jpg" alt="background">
    </div>

    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-row">
                <img src="assets/image/logo.png" alt="EUCHOICE" class="logo-img">
                <span class="logo-text">EUCHOICE</span>
            </div>
            <h3 class="page-title">Đổi mật khẩu</h3>
            <p class="page-subtitle">Thay đổi mật khẩu tài khoản của bạn</p>
        </div>

        <p-messages [(value)]="messages"></p-messages>

        <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">
            <div class="input-group-custom">
                <i class="pi pi-lock input-icon"></i>
                <input formControlName="oldPassword" [type]="showPassword ? 'text' : 'password'"
                    placeholder="Mật khẩu cũ">
                <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
                    <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
                </button>
                <div *ngIf="changePasswordForm.get('oldPassword')?.invalid &&
                    (changePasswordForm.get('oldPassword')?.dirty || changePasswordForm.get('oldPassword')?.touched)"
                    class="error-msg">
                    <span *ngIf="changePasswordForm.get('oldPassword')?.errors?.['required']">
                        Vui lòng nhập mật khẩu cũ
                    </span>
                </div>
            </div>

            <div class="input-group-custom">
                <i class="pi pi-lock input-icon"></i>
                <input formControlName="newPassword" [type]="showPasswordConfim ? 'text' : 'password'"
                    placeholder="Mật khẩu mới">
                <button type="button" class="toggle-password" (click)="showPasswordConfim = !showPasswordConfim">
                    <i [class]="showPasswordConfim ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
                </button>
                <div *ngIf="changePasswordForm.get('newPassword')?.invalid &&
                    (changePasswordForm.get('newPassword')?.dirty || changePasswordForm.get('newPassword')?.touched)"
                    class="error-msg">
                    <span *ngIf="changePasswordForm.get('newPassword')?.errors?.['required']">
                        Vui lòng nhập mật khẩu mới
                    </span>
                </div>
                <div *ngIf="errorMessages" class="error-msg">
                    Mật khẩu mới không được trùng với mật khẩu cũ.
                </div>
            </div>

            <button *ngIf="!otpSent" class="btn-auth" type="submit">Xác nhận</button>
            <button *ngIf="otpSent" class="btn-auth btn-secondary" type="button"
                (click)="navigateToSetPassword()">Quay lại trang đăng nhập</button>
        </form>

        <div class="auth-footer">
            EUCHOICE &copy; 2026
        </div>
    </div>
</div>
<p-toast/>
