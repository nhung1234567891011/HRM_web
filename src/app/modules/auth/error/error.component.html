<div class="auth-wrapper">
    <div class="auth-bg">
        <img src="assets/image/banner.jpg" alt="background">
    </div>

    <div class="auth-card error-card">
        <div class="auth-header">
            <div class="logo-row">
                <img src="assets/image/logo.png" alt="EUCHOICE" class="logo-img">
                <span class="logo-text">EUCHOICE</span>
            </div>
        </div>

        <div class="error-content">
            <div class="error-icon">
                <i class="pi pi-exclamation-triangle"></i>
            </div>
            <h1 class="error-title">Lỗi</h1>
            <p class="error-message">Trang bạn tìm kiếm không tồn tại hoặc đã bị xóa.</p>
            <button class="btn-auth" [routerLink]="['/']">
                <i class="pi pi-arrow-left" style="margin-right: 8px;"></i>
                Về trang chủ
            </button>
        </div>

        <div class="auth-footer">
            EUCHOICE &copy; 2026
        </div>
    </div>
</div>
