<div class="auth-wrapper">
    <div class="auth-bg">
        <img src="assets/image/banner.jpg" alt="background">
    </div>

    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-row">
                <img src="assets/image/logo.png" alt="EUCHOICE" class="logo-img">
                <span class="logo-text">EUCHOICE</span>
            </div>
            <h3 class="page-title">Thiết lập mật khẩu</h3>
            <p class="page-subtitle">Thiết lập mật khẩu cho lần đầu đăng nhập</p>
        </div>

        <div class="alert-info-box">
            <i class="pi pi-info-circle"></i>
            <span>Nhập mật khẩu mới cho tài khoản của bạn!</span>
        </div>

        <form [formGroup]="setPasswordForm" (submit)="handleSetPassword()">
            <div class="input-group-custom">
                <i class="pi pi-envelope input-icon"></i>
                <input formControlName="email" type="text" placeholder="Nhập email" readonly>
                <app-validation-message [form]="setPasswordForm" [messages]="validationMessages"
                    field="email"></app-validation-message>
            </div>

            <div class="input-group-custom">
                <i class="pi pi-lock input-icon"></i>
                <input formControlName="newPassword" type="password" placeholder="Nhập mật khẩu">
                <app-validation-message [form]="setPasswordForm" [messages]="validationMessages"
                    field="newPassword"></app-validation-message>
            </div>

            <div class="input-group-custom">
                <i class="pi pi-lock input-icon"></i>
                <input formControlName="repeatPassword" type="password" placeholder="Nhập lại mật khẩu">
                <app-validation-message [form]="setPasswordForm" [messages]="validationMessages"
                    field="repeatPassword"></app-validation-message>
            </div>

            <button class="btn-auth" type="submit">Xác nhận</button>
        </form>

        <div class="auth-links">
            <p>Đã có tài khoản? <a routerLink="/auth/login">Đăng nhập</a></p>
        </div>

        <div class="auth-footer">
            EUCHOICE &copy; 2026
        </div>
    </div>
</div>
<p-toast/>
