<div class="row p-3 pb-0 pt-0">
    <p-toolbar styleClass="mb-2">
        <div class="">
            <strong class="font-size-16">Gán quyền</strong>
            <p-breadcrumb [model]="$any(this).items || []"></p-breadcrumb>
        </div>
    </p-toolbar>
</div>

<div class="card-custom">
    <div class="filter-row">
        <div class="search-col">
            <span class="p-input-icon-left search-input-wrap">
                <i class="pi pi-search"></i>
                <input
                    [(ngModel)]="queryParameters.keyWord"
                    id="employeeName"
                    placeholder="Tìm theo vị trí công việc / chức vụ / SĐT"
                    pInputText
                    class="form-control"
                    (keydown.enter)="onSearch()"
                />
            </span>
        </div>

        <div class="filter-action-col">
            <button pButton pRipple label="Lọc" class="buttonfilter" (click)="onSearch()"></button>
        </div>

        <div class="filter-action-col">
            <button pButton pRipple icon="pi pi-sync" class="buttonfilter button-outline" (click)="onRefreshSearch()"></button>
        </div>

    </div>
</div>

<p-table
    [value]="employees"
    [(selection)]="selectedEmployees"
    [paginator]="false"
    [rows]="10"
    responsiveLayout="scroll"
    styleClass="p-datatable-striped custom-scrollbar"
    [rowHover]="true"
    [ngStyle]="{
        width: 'auto',
        'overflow-x': 'auto',
        'table-layout': 'auto'
    }"
>
    <ng-template pTemplate="header">
        <tr>
            <th class="text-center">
                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
            <th *ngFor="let col of columns" [hidden]="!isColumnVisible(col.field)">
                {{ col.header }}
            </th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-employee>
        <tr>
            <td class="text-center">
                <p-tableCheckbox [value]="employee"></p-tableCheckbox>
            </td>
            <td *ngFor="let col of columns" [hidden]="!isColumnVisible(col.field)">
                <span *ngIf="col.field.includes('name')">
                    {{ employee.lastName + " " + employee.firstName }}
                </span>
                <span *ngIf="col.field.includes('position')">
                    {{ employee?.staffPosition?.positionName }}
                </span>
                <span *ngIf="col.field.includes('staffTitle')">
                    {{ employee?.staffTitle?.staffTitleName }}
                </span>
                <span
                    *ngIf="col.field.includes('accountStatus')"
                    class="status-span"
                    [ngStyle]="{
                        color: getAccountStatus(employee?.accountStatus).color,
                        'background-color': getAccountStatus(
                            employee?.accountStatus
                        ).bgColor
                    }"
                >
                    {{ getAccountStatus(employee?.accountStatus).text }}
                </span>
                <span
                    *ngIf="
                        !col.field.includes('staffTitle') &&
                        !col.field.includes('accountStatus')
                    "
                >
                    {{ employee[col.field] }}
                </span>
                <span *ngIf="col.field.includes('action')">
                    <div class="" style="display: flex; align-items: center">
                        <div
                            (click)="
                                showAssignRoles(
                                    employee.id,
                                    employee.accountStatus
                                )
                            "
                            class="font-size-16 ml-2"
                            style="padding: 3px; border-radius: 50%"
                        >
                            <i class="pi pi-link"></i>
                        </div>
                    </div>
                </span>
            </td>
        </tr>
    </ng-template>
</p-table>
<div class="paging-bot dg-fix">
    <div class="paging-info">
        <div [innerHTML]="currentPageReport"></div>
    </div>
    <p-paginator
        class="org-paginator"
        [rows]="this.pageSize"
        (onPageChange)="onPageChange($event)"
        [totalRecords]="totalRecords > 0 ? totalRecords : 1"
        [rowsPerPageOptions]="[10, 20, 30]"
        [first]="(this.pageIndex - 1) * this.pageSize"
    ></p-paginator>
</div>

<p-dialog
    header="Chọn quyền hạn cho nhân viên"
    [(visible)]="showAssign"
    [modal]="true"
    [style]="{ width: '400px' }"
>
    <div class="p-field p-grid">
        <div class="p-col">
            <div class="col-12 p-0">
                <div class="field mb-0 flex align-items-center">
                    <div class="col-12 mb-2 md:col-8 md:mb-0">
                        <p-multiSelect
                            [(ngModel)]="selectedRoleIds"
                            placeholder="Chọn quyền hạn"
                            defaultLabel="Chọn quyền hạn"
                            selectedItemsLabel="{0} quyền đã chọn"
                            [options]="roles"
                            optionLabel="name"
                            optionValue="id"
                            [style]="{ width: '340px' }"
                        ></p-multiSelect>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <p-footer>
        <button
            type="button"
            pButton
            label="Hủy"
            (click)="showAssign = false"
            class="ui-button-danger cutsom-cancel me-2"
        ></button>
        <button
            type="button"
            pButton
            label="Gán quyền"
            (click)="handleAssignRole()"
            class="ui-button-success"
        ></button>
    </p-footer>
</p-dialog>
