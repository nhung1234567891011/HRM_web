<div class="row p-3 pb-0 pt-0">
    <p-toolbar styleClass="mb-2">
        <div class="">
            <strong class="font-size-16">Danh sách quyền hạn</strong>
            <p-breadcrumb [model]="$any(this).items || []"></p-breadcrumb>
        </div>
    </p-toolbar>
</div>

<div class="card-custom">
    <div class="filter-row">
        <div class="search-col">
            <span class="p-input-icon-left search-input-wrap">
                <i class="pi pi-search"></i>
                <input
                    [(ngModel)]="queryParameters.keyword"
                    id="permissionKeyword"
                    placeholder="Nhập từ khóa (tên, tên hiển thị, mô tả)"
                    pInputText
                    class="form-control"
                    (keydown.enter)="onSearch()"
                />
            </span>
        </div>

        <div class="filter-action-col">
            <button pButton pRipple label="Lọc" class="buttonfilter" (click)="onSearch()"></button>
        </div>

        <div class="filter-action-col">
            <button pButton pRipple icon="pi pi-sync" class="buttonfilter button-outline" (click)="onRefreshSearch()"></button>
        </div>

        <div class="filter-action-col">
            <button pButton pRipple icon="pi pi-plus-circle" label="Thêm" class="buttonfilter" (click)="openCreateDialog()"></button>
        </div>
    </div>
</div>

<p-table [value]="permissions" [(selection)]="selectedPermissions" [paginator]="false" [rows]="10"
    responsiveLayout="scroll" styleClass="p-datatable-striped custom-scrollbar" [rowHover]="true" [ngStyle]="{
    width: 'auto',
    'overflow-x': 'auto',
    'table-layout': 'auto'}">
    <ng-template pTemplate="header">
        <tr>
            <th class="text-center"><p-tableHeaderCheckbox></p-tableHeaderCheckbox></th>
            <th *ngFor="let col of columns" [hidden]="!isColumnVisible(col.field)">
                {{ col.header }}
            </th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-permission>
        <tr>
            <td class="text-center"><p-tableCheckbox [value]="permission"></p-tableCheckbox></td>
            <td *ngFor="let col of columns" [hidden]="!isColumnVisible(col.field)">
                <ng-container [ngSwitch]="col.field">
                    <span *ngSwitchCase="'displayName'">
                        {{ permission?._level ? "— ".repeat(permission._level) : "" }}{{ permission.displayName }}
                    </span>
                    <span *ngSwitchCase="'action'">
                        <div class="" style="display: flex; align-items: center;">
                            <div
                                class="font-size-16 ml-2"
                                style="padding: 3px; border-radius: 50%"
                                (click)="openEditDialog(permission, 'edit')"
                            >
                                <i class="pi pi-file-edit"></i>
                            </div>
                            <div
                                class="font-size-16 ml-2"
                                style="padding: 3px; border-radius: 50%"
                                (click)="openEditDialog(permission, 'view')"
                            >
                                <i class="pi pi-eye"></i>
                            </div>
                            <div
                                class="font-size-16 ml-2"
                                style="padding: 3px; border-radius: 50%"
                                (click)="requestDelete(permission)"
                            >
                                <i class="pi pi-trash"></i>
                            </div>
                        </div>
                    </span>
                    <span *ngSwitchDefault>
                        {{ permission[col.field] }}
                    </span>
                </ng-container>
            </td>
        </tr>
    </ng-template>
</p-table>
<div class="paging-bot dg-fix">
    <div class="paging-info">
        <div [innerHTML]="currentPageReport"></div>
    </div>
    <p-paginator
        class="org-paginator"
        [rows]="this.pageSize"
        (onPageChange)="onPageChange($event)"
        [totalRecords]="totalRecords > 0 ? totalRecords : 1"
        [rowsPerPageOptions]="[10, 20, 30]"
        [first]="(this.pageIndex - 1) * this.pageSize"
    ></p-paginator>
</div>

<p-dialog
    [header]="
        permissionDialogMode === 'create'
            ? 'Thêm quyền hạn'
            : permissionDialogMode === 'edit'
            ? 'Cập nhật quyền hạn'
            : 'Chi tiết quyền hạn'
    "
    [(visible)]="displayPermissionDialog"
    [modal]="true"
    [style]="{ width: '520px' }"
>
    <div class="p-fluid">
        <div class="field">
            <label>Tên quyền hạn</label>
            <input
                pInputText
                [(ngModel)]="permissionForm.name"
                [disabled]="permissionDialogMode === 'view'"
                placeholder="VD: ManagePermissionView"
            />
        </div>
        <div class="field">
            <label>Tên hiển thị</label>
            <input
                pInputText
                [(ngModel)]="permissionForm.displayName"
                [disabled]="permissionDialogMode === 'view'"
                placeholder="VD: Xem quản lý quyền"
            />
        </div>
        <div class="field">
            <label>Phân hệ</label>
            <p-dropdown
                [options]="sectionLabel.data"
                optionLabel="label"
                optionValue="key"
                [(ngModel)]="permissionForm.section"
                [disabled]="permissionDialogMode === 'view'"
                placeholder="Chọn phân hệ"
            ></p-dropdown>
        </div>
        <div class="field">
            <label>Quyền cha</label>
            <p-dropdown
                [options]="parentPermissionOptions"
                optionLabel="label"
                optionValue="value"
                [(ngModel)]="permissionForm.parentPermissionId"
                [disabled]="permissionDialogMode === 'view'"
                [showClear]="true"
                placeholder="(Không chọn nếu là quyền cha)"
            ></p-dropdown>
        </div>
        <div class="field">
            <label>Mô tả</label>
            <textarea
                pInputTextarea
                rows="4"
                [(ngModel)]="permissionForm.description"
                [disabled]="permissionDialogMode === 'view'"
                placeholder="Nhập mô tả"
            ></textarea>
        </div>
    </div>
    <p-footer>
        <button
            pButton
            type="button"
            label="Đóng"
            class="p-button-secondary"
            (click)="displayPermissionDialog = false"
        ></button>
        <button
            *ngIf="permissionDialogMode !== 'view'"
            pButton
            type="button"
            label="Lưu"
            class="ml-2"
            (click)="savePermission()"
        ></button>
    </p-footer>
</p-dialog>

<app-confirm-dialog [message]="confirmMessage"></app-confirm-dialog>
